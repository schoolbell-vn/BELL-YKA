<!DOCTYPE html>
<html lang="vi">
<head>
  <title>Hẹn Giờ Chuông Báo - Điều khiển Internet</title>
  <meta name="viewport" content="width=device-width,user-scalable=0" charset="utf-8">
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js" type="text/javascript"></script>
  
  <style type="text/css">
    /* --- CÀI ĐẶT CHUNG & SỬA LỖI TRÀN KHUNG --- */
    * {
        box-sizing: border-box;
    }
    body {
        background: linear-gradient(135deg, #232526 0%, #414345 100%);
        font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        color: #ecf0f1;
        min-height: 100vh;
        margin: 0;
    }
    #main {
        margin: 24px auto;
        width: 380px;
        max-width: 98vw;
    }

    /* --- KHUNG NỘI DUNG CHÍNH --- */
    #content {
        background: rgba(34, 40, 49, 0.98);
        border: none;
        width: 100%;
        float: left;
        border-radius: 18px;
        padding-bottom: 24px;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
    }

    /* --- TIÊU ĐỀ & MÀU SẮC NỔI BẬT --- */
    h2 {
        font-size: 1.7em;
        margin-top: 20px;
        margin-bottom: 10px;
        text-align: center;
        color: #f39c12;
        text-shadow: 0 4px 12px rgba(243, 156, 18, 0.18), 0 2px 4px rgba(0,0,0,0.08);
        letter-spacing: 1px;
        font-weight: 800;
    }
    h3 {
        margin-top: 28px;
        margin-bottom: 18px; 
        text-align: center;
        font-size: 1.25em;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        padding: 14px 18px;
        background: linear-gradient(90deg, #232526 60%, #414345 100%);
        border-radius: 12px;
        margin-left: 15px;
        margin-right: 15px;
        border-left: 7px solid;
        border-right: 7px solid;
        position: relative;
        z-index: 2;
        color: #00e6ff !important;
        text-shadow: 0 0 12px #00e6ff, 0 2px 8px #000, 0 0 24px #fff;
        box-shadow: 0 4px 24px 0 #00000044, 0 2px 8px rgba(0,0,0,0.08),
                    inset 7px 0 10px -5px,
                    inset -7px 0 10px -5px;
    }
    #header-sang { 
        border-color: #2ecc71;
        box-shadow: 0 4px 24px 0 #00000044, 0 2px 8px rgba(0,0,0,0.08),
                    inset 7px 0 10px -5px #2ecc71,
                    inset -7px 0 10px -5px #2ecc71;
    }
    #header-chieu { 
        border-color: #3498db;
        box-shadow: 0 4px 24px 0 #00000044, 0 2px 8px rgba(0,0,0,0.08),
                    inset 7px 0 10px -5px #3498db,
                    inset -7px 0 10px -5px #3498db;
    }
    hr { border: none; height: 2px; background: linear-gradient(90deg, #f1c40f 0%, #e0eafc 100%); margin: 28px 15px; border-radius: 2px; }

    /* --- THANH TRẠNG THÁI & ĐỒNG HỒ --- */
    .status-bar { 
        padding: 6px 15px;
        margin: 0 15px 14px 15px; 
        text-align: center; 
        font-weight: bold; 
        border-radius: 8px; 
        transition: all 0.5s;
        font-size: 0.7em;
        text-transform: uppercase; letter-spacing: 0.7px; box-shadow: 0 2px 8px rgba(52, 152, 219, 0.10);
        color: #ecf0f1;
    }
    .status-connected { background: linear-gradient(90deg, #43e97b 0%, #38f9d7 100%); color: #222; }
    .status-disconnected { background: linear-gradient(90deg, #ff5858 0%, #f09819 100%); color: #fff; }
    .status-connecting { background: linear-gradient(90deg, #7f8c8d 0%, #b2bec3 100%); color: #222; }
    .clock-container { text-align: center; margin: 22px 15px; background: linear-gradient(120deg, #232526 60%, #414345 100%); border: 2px solid #f1c40f; border-radius: 14px; padding: 12px 10px; box-shadow: 0 2px 12px rgba(241, 196, 15, 0.10), 0 2px 5px rgba(0,0,0,0.08); }
    .clock {
        font-size: 3.2em;
        color: #f1c40f;
        text-shadow: 0 0 10px #f1c40f88;
        letter-spacing: 2px;
        font-family: 'Courier New', Courier, monospace;
    }
    .date-display { font-size: 1.08em; color: #ecf0f1; margin-top: 7px; font-weight: 500; }

    /* --- KHU VỰC NÚT ĐIỀU KHIỂN --- */
    .button-section {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 0 15px;
        margin-top: 24px;
    }
    .modern-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 54px;
        padding: 0 15px;
        border: none;
        border-radius: 12px;
        font-size: 0.9em; /* Chỉnh sửa: Giảm cỡ chữ */
        font-weight: 700;
        letter-spacing: 1.2px;
        transition: box-shadow 0.18s, transform 0.13s, filter 0.13s;
        cursor: pointer;
        outline: none;
        position: relative;
        overflow: hidden;
        z-index: 1;
        text-transform: uppercase;
        white-space: nowrap; /* Chỉnh sửa: Đảm bảo chữ trên 1 hàng */
    }
    .modern-btn:active {
        transform: scale(0.97);
        filter: brightness(0.97);
        box-shadow: 0 2px 8px 0 #0004;
    }
    .save-button {
        width: 100%;
        background: linear-gradient(90deg, #232526 60%, #414345 100%);
        color: #00e6ff;
        border-left: 5px solid #00e6ff;
        border-right: 5px solid #00e6ff;
        text-shadow: 0 0 12px #00e6ff, 0 2px 8px #000, 0 0 24px #fff;
        box-shadow: 0 4px 18px 0 #00e6ff33, 0 2px 8px #fff2;
        font-size: 1em; /* Giữ lại size cũ cho nút chính */
    }
    .save-button:hover {
        filter: brightness(1.12);
        box-shadow: 0 10px 32px #00e6ff99, 0 2px 12px #fff4;
    }
    .button-row {
        display: flex;
        gap: 18px;
    }
    .button-row .modern-btn {
        flex-grow: 1;
    }
    .test-button {
        background: linear-gradient(90deg, #232526 60%, #414345 100%);
        color: #f1c40f;
        border-left: 5px solid #f1c40f;
        border-right: 5px solid #f1c40f;
        text-shadow: 0 0 12px #f1c40f, 0 2px 8px #000, 0 0 24px #fff;
        box-shadow: 0 4px 18px 0 #f1c40f33, 0 2px 8px #fff2;
    }
    .test-button:hover {
        filter: brightness(1.08);
        box-shadow: 0 10px 32px #f1c40f99, 0 2px 12px #fff4;
    }
    .logout-button {
        background: linear-gradient(90deg, #232526 60%, #414345 100%);
        color: #e74c3c;
        border-left: 5px solid #e74c3c;
        border-right: 5px solid #e74c3c;
        text-shadow: 0 0 12px #e74c3c, 0 2px 8px #000, 0 0 24px #fff;
        box-shadow: 0 4px 18px 0 #e74c3c33, 0 2px 8px #fff2;
    }
    .logout-button:hover {
        filter: brightness(1.08);
        box-shadow: 0 10px 32px #e74c3c99, 0 2px 12px #fff4;
    }
    .preview-button {
        width: 100%;
        margin-top: 16px;
        background: linear-gradient(90deg, #232526 60%, #414345 100%);
        color: #2ecc71;
        border-left: 5px solid #2ecc71;
        border-right: 5px solid #2ecc71;
        text-shadow: 0 0 12px #2ecc71, 0 2px 8px #000, 0 0 24px #fff;
        box-shadow: 0 4px 18px 0 #2ecc7133, 0 2px 8px #fff2;
        text-transform: uppercase;
    }
    .preview-button:hover {
        filter: brightness(1.08);
        box-shadow: 0 10px 32px #2ecc7199, 0 2px 12px #fff4;
    }
    /* Thêm style cho 2 nút mới */
    .info-button {
        background: linear-gradient(90deg, #232526 60%, #414345 100%);
        color: #9b59b6;
        border-left: 5px solid #9b59b6;
        border-right: 5px solid #9b59b6;
        text-shadow: 0 0 12px #9b59b6, 0 2px 8px #000, 0 0 24px #fff;
        box-shadow: 0 4px 18px 0 #9b59b633, 0 2px 8px #fff2;
    }
    .info-button:hover {
        filter: brightness(1.08);
        box-shadow: 0 10px 32px #9b59b699, 0 2px 12px #fff4;
    }
    .lcd-button {
        background: linear-gradient(90deg, #232526 60%, #414345 100%);
        color: #3498db;
        border-left: 5px solid #3498db;
        border-right: 5px solid #3498db;
        text-shadow: 0 0 12px #3498db, 0 2px 8px #000, 0 0 24px #fff;
        box-shadow: 0 4px 18px 0 #3498db33, 0 2px 8px #fff2;
    }
    .lcd-button:hover {
        filter: brightness(1.08);
        box-shadow: 0 10px 32px #3498db99, 0 2px 12px #fff4;
    }
    

    /* --- TAB NGÀY & NỘI DUNG TAB --- */
    .tab { display: flex; justify-content: space-around; border-bottom: 2px solid #f1c40f; margin: 0 15px 0 15px; position: relative; z-index: 1; }
    .tab button {
        flex-grow: 1; border: none; outline: none; cursor: pointer; padding: 12px 5px 10px 5px;
        transition: all 0.18s cubic-bezier(.4,0,.2,1), box-shadow 0.18s;
        font-size: 1em; font-weight: 700; border-radius: 8px 8px 0 0; margin: 0 2px;
        position: relative; top: 2px; border-bottom: 3px solid transparent;
        background: #232526; color: #f1c40f; box-shadow: 0 2px 8px #f1c40f22;
    }
    .tab button:hover {
        background: #414345; color: #fff200; box-shadow: 0 4px 16px #f1c40f55;
        transform: translateY(-2px) scale(1.04);
    }
    .tab button:active {
        background: #fff200; color: #232526; box-shadow: 0 2px 8px #fff20099;
        transform: scale(0.98);
    }
    .tab button.active { 
        background: linear-gradient(90deg, #fff200 60%, #f1c40f 100%);
        color: #232526; 
        box-shadow: 0 4px 24px #fff20099, 0 2px 8px #f1c40f55;
        border-bottom-color: #f1c40f;
        z-index: 2;
    }
    .tabcontent { 
        display: none; padding: 18px 10px 10px 10px; background: #232526;
        border-radius: 0 0 12px 12px; box-shadow: 0 2px 8px rgba(52, 152, 219, 0.05);
        margin-bottom: 8px;
    }
    .tabcontent h3 { 
        font-size: 1.08em; margin-top: 0; margin-bottom: 15px; border: none; box-shadow: none; background: none; color: #f1c40f; font-weight: 700;
        line-height: 1.4;
    }
    .session-subtitle {
        font-size: 0.8em;
        font-weight: normal;
        text-transform: none;
        color: #bdc3c7;
    }
    
    /* --- KHU VỰC CÀI ĐẶT (DETAILS) --- */
    /* Chỉnh sửa: Thêm padding để căn chỉnh */
    .div1 {
        padding: 0 15px;
    }
    details {
        border: 1.5px solid #414345; border-radius: 12px; margin-bottom: 12px;
        background: #232526; box-shadow: 0 2px 8px rgba(52, 152, 219, 0.06);
        overflow: hidden; transition: box-shadow 0.2s;
    }
    summary {
        font-weight: bold; padding: 13px 15px; cursor: pointer; outline: none;
        transition: background 0.2s, color 0.2s; list-style: none;
    }
    summary::-webkit-details-marker, summary::marker { display: none; }
    
    summary#header-sohoi {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 54px;
        border-radius: 12px;
        background: linear-gradient(90deg, #232526 60%, #414345 100%);
        color: #f1c40f;
        border-left: 5px solid #f1c40f;
        border-right: 5px solid #f1c40f;
        text-shadow: 0 0 12px #f1c40f, 0 2px 8px #000, 0 0 24px #fff;
        box-shadow: 0 4px 18px 0 #f1c40f33, 0 2px 8px #fff2;
    }
    summary#header-sohoi div:first-child {
        font-size: 1.08em;
        font-weight: 700;
        letter-spacing: 1.5px;
    }
    details[open] > summary#header-sohoi {
        background: linear-gradient(90deg, #232526 60%, #414345 100%);
        color: #f1c40f;
    }
    .details-content { padding: 12px 15px 16px 15px; border-top: 1.5px solid #414345; }
    
    .tabcontent details summary {
        text-align: center;
        font-size: 1.08em;
        border-radius: 10px 10px 0 0;
        background: #232526;
        color: #f1c40f;
    }
    details[open] > .tabcontent details summary { 
        background: #f1c40f;
        color: #232526; 
    }
    
    /* --- BẢNG LỊCH CHI TIẾT --- */
    .details-container table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #232526; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(52, 152, 219, 0.06); }
    .details-container th, .details-container td { border: 1px solid #414345; padding: 10px 5px; text-align: center; font-size: 14px; }
    .details-container th { background: #f1c40f; color: #232526; font-weight: bold; }
    .details-container tbody tr:nth-child(odd) { background: #232526; color: #ecf0f1; }
    .details-container tbody tr:nth-child(even) { background: #414345; color: #ecf0f1; }

    .divider-yellow {
        width: 90%; height: 3px; background: linear-gradient(90deg, #f1c40f 0%, #fff200 100%);
        border-radius: 2px; margin: 24px auto 18px auto; box-shadow: 0 2px 8px #f1c40f55;
    }

    /* --- GIAO DIỆN LƯỚI "THÔNG MINH" CHO CÀI ĐẶT --- */
    .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 8px 0;
    }
    .setting-item {
        background: #232526;
        border: 1.5px solid #414345;
        border-radius: 10px;
        padding: 10px;
        display: flex;
        align-items: center;
        transition: all 0.2s ease-in-out;
    }
    .setting-item:hover {
        border-color: #f1c40f;
        box-shadow: 0 0 10px #f1c40f33;
    }
    .setting-item.full-width {
        grid-column: 1 / -1;
    }
    .setting-item-icon {
        flex-shrink: 0;
        margin-right: 10px;
        color: #f1c40f;
    }
    .setting-item-icon svg {
        width: 24px;
        height: 24px;
    }
    .input-wrapper {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }
    .input-wrapper label {
        font-size: 0.8em;
        font-weight: 600;
        color: #bdc3c7;
        margin-bottom: 4px;
    }
    .unit-input {
        display: flex;
        align-items: center;
    }
    .unit-input input {
        width: 100%;
        margin-right: 8px;
    }
    .unit-input span {
        font-size: 0.9em;
        color: #bdc3c7;
    }
    .setting-item input[type="time"] {
        width: 100%;
        padding: 9px;
    }
    .activation-copy-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 0 5px;
        margin-bottom: 15px;
    }
    .activation-control {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .activation-control label {
        font-weight: bold;
        font-size: 1em;
        cursor: pointer;
    }
    .copy-button {
        padding: 8px 14px;
        font-size: 0.85em;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.18s;
        font-weight: 700;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        text-shadow: 0 1px 2px #00000044;
    }
    .copy-button:active {
        transform: scale(0.96);
        filter: brightness(0.95);
    }
    .copy-button.sang {
        background: linear-gradient(90deg, #16a085 0%, #43e97b 100%);
    }
    .copy-button.chieu {
        background: linear-gradient(90deg, #2980b9 0%, #6dd5fa 100%);
    }

    /* === THÊM MỚI: Giao diện cho Modal Thông tin hệ thống === */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s, visibility 0.3s;
    }
    .modal-overlay.visible {
        opacity: 1;
        visibility: visible;
    }
    .info-modal {
        background: #34495e;
        padding: 25px;
        border-radius: 15px;
        border: 2px solid #f1c40f;
        width: 90%;
        max-width: 360px;
        box-shadow: 0 5px 25px rgba(0,0,0,0.4);
        transform: scale(0.9);
        transition: transform 0.3s;
    }
    .modal-overlay.visible .info-modal {
        transform: scale(1);
    }
    .info-modal h4 {
        margin-top: 0;
        margin-bottom: 20px;
        color: #f1c40f;
        text-align: center;
        font-size: 1.3em;
        text-transform: uppercase;
    }
    .info-item {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #4a627a;
        font-size: 1em;
    }
    .info-item:last-child {
        border-bottom: none;
    }
    .info-item .label {
        color: #bdc3c7;
    }
    .info-item .value {
        font-weight: bold;
    }
    .info-item .value.connected {
        color: #2ecc71;
    }
    .info-item .value.disconnected {
        color: #e74c3c;
    }
    .close-modal-btn {
        margin-top: 20px;
        padding: 10px;
        width: 100%;
        background: #f1c40f;
        color: #232526;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="main">
    <div id="content">
      <div style="text-align: center; padding: 15px 0 5px 0;">
        <h2 style="margin: 0; padding: 0;">CHUÔNG BÁO TỰ ĐỘNG</h2>
        <p style="margin: 5px 0 0 0; padding: 0; font-size: 1.2em; color: #00e6ff; font-weight: bold; text-shadow: 0 0 8px #00e6ff, 0 2px 8px #000; letter-spacing: 1.2px;">THPT YÊN KHÁNH A</p>
      </div>
      <div class="clock-container" id="clock-wrapper" style="display: none;">
        <div id="clock" class="clock">--:--:--</div>
        <div id="date" class="date-display">Đang chờ đồng bộ...</div>
      </div>
      
      <div id="status" class="status-bar status-connecting">Đang kết nối...</div>
      
      <h3 id="header-sang">LỊCH BUỔI SÁNG</h3>
      <div class="tab" id="tab_sang">
        <button class="tablinks-sang" onclick="openDay(event, 't2_sang', 'sang')">Thứ 2</button>
        <button class="tablinks-sang" onclick="openDay(event, 't3_sang', 'sang')">Thứ 3</button>
        <button class="tablinks-sang" onclick="openDay(event, 't4_sang', 'sang')">Thứ 4</button>
        <button class="tablinks-sang" onclick="openDay(event, 't5_sang', 'sang')">Thứ 5</button>
        <button class="tablinks-sang" onclick="openDay(event, 't6_sang', 'sang')">Thứ 6</button>
        <button class="tablinks-sang" onclick="openDay(event, 't7_sang', 'sang')">Thứ 7</button>
        <button class="tablinks-sang" onclick="openDay(event, 'cn_sang', 'sang')">CN</button>
      </div>
      <div id="tab-container-sang"></div>
      <div class="divider-yellow"></div>
      
      <h3 id="header-chieu">LỊCH BUỔI CHIỀU</h3>
      <div class="tab" id="tab_chieu">
        <button class="tablinks-chieu" onclick="openDay(event, 't2_chieu', 'chieu')">Thứ 2</button>
        <button class="tablinks-chieu" onclick="openDay(event, 't3_chieu', 'chieu')">Thứ 3</button>
        <button class="tablinks-chieu" onclick="openDay(event, 't4_chieu', 'chieu')">Thứ 4</button>
        <button class="tablinks-chieu" onclick="openDay(event, 't5_chieu', 'chieu')">Thứ 5</button>
        <button class="tablinks-chieu" onclick="openDay(event, 't6_chieu', 'chieu')">Thứ 6</button>
        <button class="tablinks-chieu" onclick="openDay(event, 't7_chieu', 'chieu')">Thứ 7</button>
        <button class="tablinks-chieu" onclick="openDay(event, 'cn_chieu', 'chieu')">CN</button>
      </div>
      <div id="tab-container-chieu"></div>
      <div class="divider-yellow"></div>
      
      <div class="div1">
          <details>
              <summary id="header-sohoi">
                  <div>CÀI ĐẶT SỐ HỒI CHUÔNG</div>
                  <span style="font-size: 0.8em; font-weight: normal; color: #ccc; margin-top: 2px;">(SÁNG - CHIỀU)</span>
              </summary>
              <div class="details-content">
                  <div class="settings-grid">
                      <div class="setting-item">
                          <div class="setting-item-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13.586V10c0-3.217-2.185-5.927-5-6.758V2h-4v1.242C7.185 4.073 5 6.783 5 10v3.586l-1.707 1.707A.996.996 0 0 0 3 16v2a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1v-2a.996.996 0 0 0-.293-.707L19 13.586zM19 17H5v-.586l1.707-1.707A.996.996 0 0 0 7 14v-4c0-2.757 2.243-5 5-5s5 2.243 5 5v4c0 .266.105.52.293.707L19 16.414V17zM12 22a2.98 2.98 0 0 0 2.818-2H9.182A2.98 2.98 0 0 0 12 22z"></path></svg></div>
                          <div class="input-wrapper">
                              <label for="sohoi_batdau">Bắt đầu buổi học</label>
                              <div class="unit-input"><input id="sohoi_batdau" type="number" value="6"><span>hồi</span></div>
                          </div>
                      </div>
                      <div class="setting-item">

    function updatePreviewTable(e){const t=document.getElementById(`enable_${e}`).checked,o=document.getElementById("details-"+e);if(!o)return;if(!t)return void(o.innerHTML="<p style='text-align:center; padding: 10px;'>Lịch này đang tắt.</p>");const n=calculateSchedule(e);let a="<table><thead><tr><th>STT</th><th>Thời gian</th><th>Nội dung</th></tr></thead><tbody>";n.forEach((e,t)=>{a+=`<tr><td>${t+1}</td><td>${e.time}</td><td>${e.description}</td></tr>`}),a+="</tbody></table>",o.innerHTML=a}
    function copyAfternoonSchedule(sourceDayId) { const sourceDayName = document.querySelector(`.tablinks-chieu[onclick*="'${sourceDayId}'"]`).innerText; if (!confirm(`Bạn có chắc muốn sao chép lịch của ${sourceDayName} (chiều) đến tất cả các ngày còn lại của buổi chiều không?`)) return; const sourceData = { enabled: document.getElementById(`enable_${sourceDayId}`).checked, gio: document.getElementById(`gio_${sourceDayId}`).value, tiethoc: document.getElementById(`tiethoc_${sourceDayId}`).value, rachoi: document.getElementById(`rachoi_${sourceDayId}`).value, duvaotiet: document.getElementById(`duvaotiet_${sourceDayId}`).value, sotiet: document.getElementById(`sotiet_${sourceDayId}`).value }; const sourceBaseId = sourceDayId.replace('_chieu', ''); days.filter(day => day.id !== sourceBaseId).forEach(day => { const targetDayId = `${day.id}_chieu`; document.getElementById(`enable_${targetDayId}`).checked = sourceData.enabled; document.getElementById(`gio_${targetDayId}`).value = sourceData.gio; document.getElementById(`tiethoc_${targetDayId}`).value = sourceData.tiethoc; document.getElementById(`rachoi_${targetDayId}`).value = sourceData.rachoi; document.getElementById(`duvaotiet_${targetDayId}`).value = sourceData.duvaotiet; document.getElementById(`sotiet_${targetDayId}`).value = sourceData.sotiet; updatePreviewTable(targetDayId); }); alert('Sao chép thành công! \n\nHãy nhấn nút "Lưu và gửi cập nhật" để áp dụng các thay đổi này.'); }
    function copyMorningSchedule(sourceDayId) { const sourceDayName = document.querySelector(`.tablinks-sang[onclick*="'${sourceDayId}'"]`).innerText; if (!confirm(`Bạn có chắc muốn sao chép lịch của ${sourceDayName} (sáng) đến các ngày còn lại (T3-T7) không?`)) return; const sourceData = { enabled: document.getElementById(`enable_${sourceDayId}`).checked, gio: document.getElementById(`gio_${sourceDayId}`).value, chunhiem: document.getElementById(`chunhiem_${sourceDayId}`).value, tiethoc: document.getElementById(`tiethoc_${sourceDayId}`).value, rachoi: document.getElementById(`rachoi_${sourceDayId}`).value, duvaotiet: document.getElementById(`duvaotiet_${sourceDayId}`).value, sotiet: document.getElementById(`sotiet_${sourceDayId}`).value }; const sourceBaseId = sourceDayId.replace('_sang', ''); const targetDayIds = ['t3', 't4', 't5', 't6', 't7'].filter(id => id !== sourceBaseId); targetDayIds.forEach(dayId => { const targetDayId = `${dayId}_sang`; document.getElementById(`enable_${targetDayId}`).checked = sourceData.enabled; document.getElementById(`gio_${targetDayId}`).value = sourceData.gio; document.getElementById(`chunhiem_${targetDayId}`).value = sourceData.chunhiem; document.getElementById(`tiethoc_${targetDayId}`).value = sourceData.tiethoc; document.getElementById(`rachoi_${targetDayId}`).value = sourceData.rachoi; document.getElementById(`duvaotiet_${targetDayId}`).value = sourceData.duvaotiet; document.getElementById(`sotiet_${targetDayId}`).value = sourceData.sotiet; updatePreviewTable(targetDayId); }); alert('Sao chép thành công! \n\nHãy nhấn nút "Lưu và gửi cập nhật" để áp dụng các thay đổi này.'); }
