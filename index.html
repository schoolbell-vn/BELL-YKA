<!DOCTYPE html>
<html lang="vi">
<head>
  <title>Hẹn Giờ Chuông Báo - Điều khiển Internet</title>
  <meta name="viewport" content="width=device-width,user-scalable=0" charset="utf-8">
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js" type="text/javascript"></script>
  
  <style type="text/css">
    /* --- CÀI ĐẶT CHUNG & SỬA LỖI TRÀN KHUNG --- */
    * { box-sizing: border-box; }
    body {
        background: linear-gradient(135deg, #3a4750 0%, #4a627a 100%);
        font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        color: #f5f6fa;
        min-height: 100vh;
        margin: 0;
        font-size: 15px;
    }
    #main { margin: 24px auto; width: 380px; max-width: 98vw; }
    #content {
        background: #2c3e50;
        border: none;
        width: 100%;
        float: left;
        border-radius: 18px;
        padding: 0 0 24px 0;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
    }

    /* === KHU VỰC THÔNG BÁO === */
    #notification-area{position:fixed;top:15px;left:50%;transform:translateX(-50%);z-index:1010;width:90%;max-width:360px}
    .notification{padding:10px 15px;border-radius:8px;color:#fff;font-weight:700;text-align:center;box-shadow:0 4px 12px #0000004d;opacity:0;transform:translateY(-20px);transition:opacity .3s,transform .3s;margin-bottom:10px;font-size:.9em}
    .notification.show{opacity:1;transform:translateY(0)}
    .notification.success{background:linear-gradient(90deg,#27ae60,#2ecc71)}
    .notification.error{background:linear-gradient(90deg,#c0392b,#e74c3c)}
    .notification.info{background:linear-gradient(90deg,#2980b9,#3498db)}
    
    /* TIÊU ĐỀ MỤC MỚI */
    .section-header {
        margin: 20px 15px 15px 15px; text-align: center; font-size: 1.1em; font-weight: 700;
        text-transform: uppercase; letter-spacing: 1.5px; padding-bottom: 8px;
        border-bottom: 2px solid #414345; color: #f39c12;
    }

    /* --- THANH TRẠNG THÁI & ĐỒNG HỒ (BỐ CỤC MỚI) --- */
    .status-header { display: flex; flex-direction: column; gap: 10px; padding: 0 15px; margin-bottom: 15px; }
    .status-bar { padding: 8px 15px; text-align: center; font-weight: bold; border-radius: 8px; transition: all 0.5s; font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.7px; }
    .status-connected { background: linear-gradient(90deg, #43e97b 0%, #38f9d7 100%); color: #222; }
    .status-disconnected { background: linear-gradient(90deg, #ff5858 0%, #f09819 100%); color: #fff; }
    .status-connecting { background: linear-gradient(90deg, #7f8c8d 0%, #b2bec3 100%); color: #222; }
    .clock-container { text-align: center; background: #232526; border-radius: 8px; padding: 5px 10px; }
    .clock { font-size: 2em; color: #f1c40f; text-shadow: 0 0 10px #f1c40f88; letter-spacing: 2px; font-family: 'Courier New', Courier, monospace; }
    .date-display { font-size: 0.8em; color: #bdc3c7; margin-top: 2px; }

    /* --- GIAO DIỆN TAB VÀ NÚT GẠT SÁNG/CHIỀU MỚI --- */
    .tab-bar { display: flex; justify-content: space-around; padding: 0 15px; margin-bottom: 15px; gap: 5px; }
    .tab-link { flex-grow: 1; border: none; outline: none; cursor: pointer; padding: 10px 5px; transition: all 0.2s ease-out; font-size: 0.9em; font-weight: 700; border-radius: 8px; background: #34495e; color: #bdc3c7; border-bottom: 3px solid transparent; }
    .tab-link:hover { background: #4a627a; color: #fff; }
    .tab-link.active { background: #f1c40f; color: #232526; }
    .session-toggle { display: flex; padding: 4px; background-color: #232526; border-radius: 10px; margin: 0 15px 15px 15px; gap: 4px; }
    .session-btn { flex: 1; padding: 8px; font-size: 0.9em; font-weight: bold; color: #bdc3c7; background-color: transparent; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s ease-in-out; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .session-btn.active { color: #fff; }
    .session-btn[data-session="sang"].active { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .session-btn[data-session="chieu"].active { background: linear-gradient(90deg, #2980b9, #3498db); }

    /* --- KHUNG NỘI DUNG LỊCH HỌC MỚI --- */
    .schedule-content-container { padding: 0 15px; min-height: 520px; }
    .schedule-settings-wrapper { background-color: #232526; border-radius: 12px; padding: 15px; animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .divider-yellow { width: 90%; height: 2px; background: linear-gradient(90deg, #f1c40f 0%, #fff200 100%); border-radius: 2px; margin: 24px auto 18px auto; box-shadow: 0 2px 8px #f1c40f55; }

    /* --- KHU VỰC CÀI ĐẶT DẠNG THU GỌN MỚI --- */
    .collapsible-section-container { padding: 0 15px; display: flex; flex-direction: column; gap: 15px; }
    .collapsible-section { border: 1px solid #414345; border-radius: 12px; background: #232526; overflow: hidden; }
    .collapsible-header { font-weight: bold; padding: 12px 15px; cursor: pointer; outline: none; list-style: none; font-size: 1em; display: flex; align-items: center; gap: 10px; color: #f1c40f; }
    .collapsible-header::-webkit-details-marker { display: none; }
    .collapsible-header svg { width: 22px; height: 22px; }
    .collapsible-content { padding: 15px; border-top: 1px solid #414345; }
    .button-section { display: flex; flex-direction: column; gap: 10px; }

    /* --- CSS CŨ ĐƯỢC GIỮ LẠI VÀ TINH CHỈNH --- */
    .modern-btn { display: flex; align-items: center; justify-content: center; height: 45px; padding: 0 15px; border: none; border-radius: 10px; font-size: 0.9em; font-weight: 700; letter-spacing: 1px; transition: all 0.2s ease-out; cursor: pointer; outline: none; text-transform: uppercase; width: 100%; }
    .modern-btn svg { margin-right: 10px; }
    .save-button { background: linear-gradient(90deg,#232526 60%,#414345 100%); color: #00e6ff; border-left: 4px solid #00e6ff; border-right: 4px solid #00e6ff; }
    .test-button { background: linear-gradient(90deg,#232526 60%,#414345 100%); color: #f1c40f; border-left: 4px solid #f1c40f; border-right: 4px solid #f1c40f; }
    .advanced-button { background: linear-gradient(90deg,#485563 0%,#29323c 100%); color: #bdc3c7; border-left: 4px solid #bdc3c7; border-right: 4px solid #bdc3c7; }
    .logout-button { background: linear-gradient(90deg,#232526 60%,#414345 100%); color: #e74c3c; border-left: 4px solid #e74c3c; border-right: 4px solid #e74c3c; }

    .toggle-group { background-color: #2c3e50; border-radius: 8px; padding: 5px; margin-bottom: 10px; }
    .toggle-control { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; }
    .toggle-control .label-text { font-weight: bold; font-size: 0.9em; cursor: pointer; }
    .switch { position: relative; display: inline-block; width: 46px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #4a4e54; transition: .3s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #bdc3c7; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .chieu-toggle input:checked + .slider { background: linear-gradient(90deg, #2980b9, #3498db); }
    input:checked + .slider:before { transform: translateX(22px); background-color: white; }
    
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .input-wrapper { display: flex; flex-direction: column; }
    .input-wrapper label { font-size: 0.8em; font-weight: 600; color: #bdc3c7; margin-bottom: 4px; }
    input[type="time"], input[type="number"] { width: 100%; padding: 8px; font-size: 1em; border-radius: 6px; border: 1px solid #414345; background: #34495e; color: #fff; }
    
    .details-container table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .details-container th, .details-container td { border: 1px solid #414345; padding: 8px 5px; text-align: center; font-size: 0.9em; }
    .details-container th { background: #f1c40f; color: #232526; }
    
    .copy-button { padding: 8px 12px; font-size: 0.8em; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; }
    .copy-button.sang { background: linear-gradient(90deg, #16a085 0%, #43e97b 100%); }
    .copy-button.chieu { background: linear-gradient(90deg, #2980b9 0%, #6dd5fa 100%); }
    
    /* === CSS CHO CÁC MODAL (GIỮ NGUYÊN) === */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; }
    .modal-overlay.visible { opacity: 1; visibility: visible; }
    .modal-content { background: #2c3e50; padding: 20px; border-radius: 15px; border-top: 5px solid #f1c40f; width: 95%; max-width: 400px; transform: scale(0.9); transition: transform 0.3s; }
    .modal-overlay.visible .modal-content { transform: scale(1); }
    .modal-content h4 { margin-top: 0; color: #f1c40f; text-align: center; font-size: 1.2em; }
    .adv-modal-tabs { display: flex; border-bottom: 2px solid #414345; margin-bottom: 15px; }
    .adv-modal-tab { flex-grow: 1; padding: 10px 2px; text-align: center; cursor: pointer; font-weight: bold; color: #7f8c8d; border-bottom: 3px solid transparent; font-size: 0.75em;}
    .adv-modal-tab.active { color: #f39c12; border-bottom-color: #f39c12; }
    .adv-modal-tab-content { display: none; }
    .adv-modal-tab-content.active { display: block; }
    .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
    .modal-buttons button { flex-grow: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .modal-confirm-btn { background: #f1c40f; color: #232526; }
    .modal-cancel-btn { background: #7f8c8d; color: #fff; }
  </style>
</head>
<body>
  <div id="notification-area"></div>

  <div id="main">
    <div id="content">
      <div style="text-align: center; padding: 15px 0 5px 0;">
        <h2 style="margin: 0; padding: 0;">CHUÔNG BÁO TỰ ĐỘNG</h2>
        <p style="margin: 5px 0 15px 0; font-size: 1.1em; color: #00e6ff; font-weight: bold;">THPT YÊN KHÁNH A</p>
      </div>
      
      <div class="status-header">
          <div id="status" class="status-bar status-connecting">Đang kết nối...</div>
          <div class="clock-container" id="clock-wrapper" style="display: none;">
            <div id="clock" class="clock">--:--:--</div>
            <div id="date" class="date-display">Đang chờ đồng bộ...</div>
          </div>
      </div>

      <h3 class="section-header">CÀI ĐẶT LỊCH HỌC</h3>
      
      <div class="tab-bar" id="day-tabs">
        <button class="tab-link" data-day="t2">T2</button>
        <button class="tab-link" data-day="t3">T3</button>
        <button class="tab-link" data-day="t4">T4</button>
        <button class="tab-link" data-day="t5">T5</button>
        <button class="tab-link" data-day="t6">T6</button>
        <button class="tab-link" data-day="t7">T7</button>
        <button class="tab-link" data-day="cn">CN</button>
      </div>

      <div class="session-toggle" id="session-toggle">
          <button class="session-btn active" data-session="sang">Sáng</button>
          <button class="session-btn" data-session="chieu">Chiều</button>
      </div>
      
      <div id="schedule-content" class="schedule-content-container">
        </div>
      
      <div class="divider-yellow"></div>

      <div class="collapsible-section-container">
        <details class="collapsible-section">
            <summary class="collapsible-header">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22a2.98 2.98 0 0 0 2.818-2H9.182A2.98 2.98 0 0 0 12 22zm7-7.414V10c0-3.217-2.185-5.927-5-6.758V2h-4v1.242C7.185 4.073 5 6.783 5 10v4.586l-1.707 1.707A.996.996 0 0 0 3 17v1a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1v-1a.996.996 0 0 0-.293-.707L19 14.586z"></path></svg>
                <span>Cài đặt số hồi chuông</span>
            </summary>
            <div class="collapsible-content">
              <div class="settings-grid">
                <div class="input-wrapper"><label for="sohoi_batdau">Bắt đầu buổi</label><input id="sohoi_batdau" type="number"></div>
                <div class="input-wrapper"><label for="sohoi_vaotiet">Vào tiết</label><input id="sohoi_vaotiet" type="number"></div>
                <div class="input-wrapper"><label for="sohoi_rachoi">Ra chơi</label><input id="sohoi_rachoi" type="number"></div>
                <div class="input-wrapper"><label for="sohoi_duvao">Dự vào</label><input id="sohoi_duvao" type="number"></div>
                <div class="input-wrapper"><label for="sohoi_tg_reo">T.gian reo (ms)</label><input id="sohoi_tg_reo" type="number"></div>
                <div class="input-wrapper"><label for="sohoi_tg_nghi">T.gian nghỉ (ms)</label><input id="sohoi_tg_nghi" type="number"></div>
              </div>
            </div>
        </details>

        <details class="collapsible-section" open>
            <summary class="collapsible-header">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 0 2l-.15.08a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l-.22-.38a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1 0-2l.15-.08a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zm0 10a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"></path></svg>
                <span>Khu vực điều khiển</span>
            </summary>
            <div class="collapsible-content">
                <div class="button-section">
                  <button class="modern-btn save-button" onclick="publishUpdate()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg><span>Lưu và gửi cập nhật</span></button>
                  <button class="modern-btn test-button" onclick="publishTestBell()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span>Thử Chuông Chung</span></button>
                  <button class="modern-btn advanced-button" onclick="openAdvancedSettingsModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg><span>Cài đặt nâng cao</span></button>
                  <button class="modern-btn logout-button" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg><span>Đăng xuất</span></button>
                </div>
            </div>
        </details>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="advanced-settings-modal">
    </div>
  <div class="modal-overlay" id="password-modal-overlay">
    </div>


  <script>
    if ("true" !== sessionStorage.getItem("isLoggedIn")) window.location.href = "login.html";

    // --- PHẦN 1: CÁC BIẾN TOÀN CỤC VÀ CÀI ĐẶT MQTT ---
    let client, serverTime = null;
    const brokerUrl = "wss://366af3ec40124749863257ecd2c62b3e.s1.eu.hivemq.cloud:8884/mqtt";
    const options = { username: "ngoctuyka", password: "Tu12345678@", clientId: "WebAppClient_" + Date.now() };
    const DATA_STATUS_TOPIC = "esp32/bell/data/status";
    const SET_DATA_TOPIC = "esp32/bell/data/set";
    const GET_DATA_TOPIC = "esp32/bell/data/get";
    const ONLINE_STATUS_TOPIC = "esp32/bell/status/online";
    const CONTROL_TOPIC = "esp32/bell/control";
    
    // --- BIẾN TRẠNG THÁI GIAO DIỆN MỚI ---
    let currentDay = 't2';
    let currentSession = 'sang';
    const days = [{ id: "t2", name: "Thứ 2" }, { id: "t3", name: "Thứ 3" }, { id: "t4", name: "Thứ 4" }, { id: "t5", name: "Thứ 5" }, { id: "t6", name: "Thứ 6" }, { id: "t7", name: "Thứ 7" }, { id: "cn", name: "Chủ Nhật" }];
    let scheduleDataCache = null;

    // --- PHẦN 2: LOGIC KẾT NỐI MQTT VÀ XỬ LÝ MESSAGE ---
    function connectToMqtt() {
        const statusDiv = document.getElementById("status");
        client = mqtt.connect(brokerUrl, options);
        client.on("connect", () => {
            client.subscribe([DATA_STATUS_TOPIC, ONLINE_STATUS_TOPIC], (err) => {
                if (!err) client.publish(GET_DATA_TOPIC, '1', { qos: 1 });
            });
        });
        client.on("message", (topic, payload) => {
            const payloadString = payload.toString();
            if (topic === ONLINE_STATUS_TOPIC) {
                statusDiv.textContent = payloadString === 'online' ? "Thiết bị đang hoạt động" : "Thiết bị ngoại tuyến";
                statusDiv.className = `status-bar status-${payloadString === 'online' ? 'connected' : 'disconnected'}`;
                document.getElementById('clock-wrapper').style.display = payloadString === 'online' ? 'block' : 'none';
            }
            if (topic === DATA_STATUS_TOPIC && payloadString) _load(payloadString);
        });
        client.on("close", () => {
            statusDiv.textContent = "Mất kết nối máy chủ";
            statusDiv.className = "status-bar status-disconnected";
        });
    }
    
    // --- PHẦN 3: CÁC HÀM ĐIỀU KHIỂN GIAO DIỆN MỚI ---
    function init() {
        connectToMqtt();
        setInterval(updateLocalClock, 1000);
        const todayIndex = (new Date().getDay() + 6) % 7;
        currentDay = days[todayIndex].id;
        document.querySelectorAll('.tab-link').forEach(tab => tab.addEventListener('click', () => handleTabClick(tab.dataset.day)));
        document.querySelectorAll('.session-btn').forEach(btn => btn.addEventListener('click', () => handleSessionToggle(btn.dataset.session)));
        renderScheduleUI();
    }
    function handleTabClick(dayId) { currentDay = dayId; renderScheduleUI(); }
    function handleSessionToggle(session) { currentSession = session; renderScheduleUI(); }
    
    function renderScheduleUI() {
        document.querySelectorAll('.tab-link').forEach(tab => tab.classList.toggle('active', tab.dataset.day === currentDay));
        document.querySelectorAll('.session-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.session === currentSession));
        
        const contentDiv = document.getElementById('schedule-content');
        const dayId = `${currentDay}_${currentSession}`;
        const dayName = days.find(d => d.id === currentDay).name;
        contentDiv.innerHTML = createScheduleSettingsHTML(dayId, dayName, currentSession);
        
        if (scheduleDataCache) populateForm();
    }

    function createScheduleSettingsHTML(dayId, dayName, session) {
        const isMondayMorning = (dayId === 't2_sang');
        let specialEventLabel = isMondayMorning ? 'Có Giờ Chào cờ' : 'Có Giờ Sinh hoạt';
        let copyButtonHTML = '';
        if (session === 'sang' && dayId !== 't2_sang') {
            copyButtonHTML = `<div class="copy-button-container"><button class="copy-button sang" onclick="copyMorningSchedule()">Sao chép đến T3-CN (Sáng)</button></div>`;
        } else if (session === 'chieu') {
            copyButtonHTML = `<div class="copy-button-container"><button class="copy-button chieu" onclick="copyAfternoonSchedule()">Sao chép đến các ngày Chiều</button></div>`;
        }
        
        return `
        <div class="schedule-settings-wrapper">
            <h4 style="text-align:center; margin-top:0; color: #f1c40f;">Cài đặt Lịch ${dayName} (Buổi ${session === "sang" ? "Sáng" : "Chiều"})</h4>
            <div class="toggle-group">
                <div class="toggle-control"><label class="label-text" for="enable">Kích hoạt Lịch</label><label class="switch ${session === "chieu" ? "chieu-toggle" : ""}"><input type="checkbox" id="enable" onchange="updateCacheFromUI()"><span class="slider"></span></label></div>
                <div class="toggle-control"><label class="label-text" for="has_special_event">${specialEventLabel}</label><label class="switch ${session === "chieu" ? "chieu-toggle" : ""}"><input type="checkbox" id="has_special_event" onchange="toggleSpecialEvent(); updateCacheFromUI()"><span class="slider"></span></label></div>
                <div class="toggle-control"><label class="label-text" for="has_duvao_bell">Có Chuông Dự vào</label><label class="switch ${session === "chieu" ? "chieu-toggle" : ""}"><input type="checkbox" id="has_duvao_bell" onchange="toggleDuVao(); updateCacheFromUI()"><span class="slider"></span></label></div>
            </div>
            ${copyButtonHTML}
            <div class="settings-grid">
                <div class="input-wrapper" style="grid-column: 1 / -1;"><label for="gio">Giờ vào học</label><input id="gio" type="time" onchange="updateCacheFromUI()"></div>
                <div id="special_event_container" class="input-wrapper" style="display: none; grid-column: 1 / -1;"><label for="${isMondayMorning ? `chaoco` : `chunhiem`}">${isMondayMorning ? 'TG Chào cờ' : 'TG Sinh hoạt'}</label><input id="${isMondayMorning ? `chaoco` : `chunhiem`}" type="number" onchange="updateCacheFromUI()"></div>
                <div class="input-wrapper"><label for="tiethoc">TG Tiết học</label><input id="tiethoc" type="number" onchange="updateCacheFromUI()"></div>
                <div class="input-wrapper"><label for="rachoi">TG Ra chơi</label><input id="rachoi" type="number" onchange="updateCacheFromUI()"></div>
                <div id="duvao_wrapper" class="input-wrapper"><label for="duvaotiet">TG Dự vào</label><input id="duvaotiet" type="number" onchange="updateCacheFromUI()"></div>
                <div class="input-wrapper"><label for="sotiet">Số tiết học</label><input id="sotiet" type="number" onchange="updateCacheFromUI()"></div>
            </div>
            <button class="modern-btn" onclick="updatePreviewTable()" style="margin-top: 15px;">Xem Chi Tiết Lịch</button>
            <details style="margin-top: 10px;">
                <summary style="padding:10px; cursor:pointer; font-weight:bold;">Bảng chi tiết</summary>
                <div class="details-container" id="details-table"></div>
            </details>
        </div>`;
    }

    // --- PHẦN 4: LOGIC XỬ LÝ DỮ LIỆU ---
    function _load(payloadString) {
        try {
            const data = JSON.parse(payloadString);
            if (data.schedule && data.epoch) {
                setTime(data.epoch);
                scheduleDataCache = data.schedule;
                renderScheduleUI(); // Render UI với dữ liệu mới
            }
        } catch (t) { console.error("Lỗi parse JSON:", t); }
    }

    function populateForm() {
        if (!scheduleDataCache) return;
        // Điền dữ liệu cho phần số hồi chuông
        Object.keys(scheduleDataCache.sohoi).forEach(key => {
            const el = document.getElementById(`sohoi_${key}`);
            if (el) el.value = scheduleDataCache.sohoi[key];
        });
        
        // Điền dữ liệu cho ngày/buổi hiện tại
        const dayConfig = scheduleDataCache.lich?.[currentSession]?.[currentDay];
        if (dayConfig) {
            document.getElementById('enable').checked = dayConfig.enabled;
            document.getElementById('gio').value = dayConfig.gio || "";
            document.getElementById('tiethoc').value = dayConfig.tiethoc || "";
            document.getElementById('rachoi').value = dayConfig.rachoi || "";
            document.getElementById('duvaotiet').value = dayConfig.duvaotiet || "";
            document.getElementById('sotiet').value = dayConfig.sotiet || "";
            document.getElementById('has_special_event').checked = dayConfig.has_special_event || false;
            document.getElementById('has_duvao_bell').checked = dayConfig.has_duvao_bell;

            const specialInputId = (currentDay === 't2' && currentSession === 'sang') ? 'chaoco' : 'chunhiem';
            const specialInput = document.getElementById(specialInputId);
            if (specialInput) specialInput.value = dayConfig[specialInputId] || "";

            toggleSpecialEvent();
            toggleDuVao();
        }
    }

    function updateCacheFromUI() {
        if (!scheduleDataCache) return;
        const dayConfig = scheduleDataCache.lich[currentSession][currentDay];
        dayConfig.enabled = document.getElementById('enable').checked;
        dayConfig.gio = document.getElementById('gio').value;
        dayConfig.tiethoc = parseInt(document.getElementById('tiethoc').value) || 0;
        dayConfig.rachoi = parseInt(document.getElementById('rachoi').value) || 0;
        dayConfig.duvaotiet = parseInt(document.getElementById('duvaotiet').value) || 0;
        dayConfig.sotiet = parseInt(document.getElementById('sotiet').value) || 0;
        dayConfig.has_special_event = document.getElementById('has_special_event').checked;
        dayConfig.has_duvao_bell = document.getElementById('has_duvao_bell').checked;
        
        const specialInputId = (currentDay === 't2' && currentSession === 'sang') ? 'chaoco' : 'chunhiem';
        const specialInput = document.getElementById(specialInputId);
        if (specialInput) dayConfig[specialInputId] = parseInt(specialInput.value) || 0;
    }

    // --- PHẦN 5: CÁC HÀM TIỆN ÍCH VÀ CHỨC NĂNG CŨ (ĐẦY ĐỦ) ---
    function showNotification(message,type="success"){const area=document.getElementById("notification-area"),notif=document.createElement("div");notif.className=`notification ${type}`,notif.textContent=message,area.appendChild(notif),setTimeout(()=>{notif.classList.add("show")},10),setTimeout(()=>{notif.classList.remove("show"),setTimeout(()=>{area.contains(notif)&&area.removeChild(notif)},300)},4e3)}
    
    function publishUpdate() {
        if (!client || !client.connected) return showNotification("Chưa kết nối máy chủ!", 'error');
        // Cập nhật cache từ UI lần cuối trước khi gửi
        updateCacheFromUI();
        // Cập nhật cache cho phần số hồi chuông
        Object.keys(scheduleDataCache.sohoi).forEach(key => {
            scheduleDataCache.sohoi[key] = parseInt(document.getElementById(`sohoi_${key}`).value) || 0;
        });
        const payload = { schedule: scheduleDataCache };
        client.publish(SET_DATA_TOPIC, JSON.stringify(payload), { qos: 1, retain: true });
        showNotification("Đã gửi lệnh cập nhật lịch...", "success");
    }

    function publishTestBell(){if(client&&client.connected){client.publish(CONTROL_TOPIC,JSON.stringify({command:"TEST_BELL"}),{qos:1});showNotification("Đã gửi lệnh thử chuông chung...")}else showNotification("Chưa kết nối máy chủ!","error")}
    function logout(){sessionStorage.removeItem("isLoggedIn"),window.location.href="login.html"}
    function setTime(epoch){serverTime=new Date(1e3*epoch),document.getElementById("date").innerHTML=serverTime.toLocaleDateString("vi-VN",{weekday:"long",year:"numeric",month:"long",day:"numeric"}),updateLocalClock()}
    function updateLocalClock(){serverTime&&(serverTime.setSeconds(serverTime.getSeconds()+1),document.getElementById("clock").innerHTML=serverTime.toLocaleTimeString("en-GB"))}
    
    function toggleSpecialEvent(){const e=document.getElementById("has_special_event"),t=document.getElementById("special_event_container");t&&(t.style.display=e.checked?"grid":"none")}
    function toggleDuVao(){const e=document.getElementById("has_duvao_bell"),t=document.getElementById("duvao_wrapper");t&&(t.style.display=e.checked?"grid":"none")}
    
    function timeToMinute(e){if(!e)return 0;const[t,o]=e.split(":").map(Number);return 60*t+o}
    function minuteToTime(e){const t=Math.floor(e/60).toString().padStart(2,"0"),o=(e%60).toString().padStart(2,"0");return`${t}:${o}`}
    
    function calculateSchedule() {
        const dayConfig = scheduleDataCache.lich[currentSession][currentDay];
        if (!dayConfig) return [];

        const startTime = timeToMinute(dayConfig.gio);
        const lessonTime = dayConfig.tiethoc;
        const breakTime = dayConfig.rachoi;
        const prepareTime = dayConfig.has_duvao_bell ? dayConfig.duvaotiet : 0;
        const lessonCount = dayConfig.sotiet;
        const eventTime = dayConfig.has_special_event ? (dayConfig.chaoco || dayConfig.chunhiem || 0) : 0;

        let schedule = [], currentTime = startTime;

        if (eventTime > 0) {
            schedule.push({ time: currentTime, description: "Chào cờ / SHCN" });
            currentTime += eventTime;
        }
        
        for (let i = 1; i <= lessonCount; i++) {
            if (i > 1 && breakTime > 0) {
                schedule.push({ time: currentTime, description: `Ra chơi tiết ${i - 1}` });
                currentTime += breakTime;
            }
            if (i > 1 && prepareTime > 0 && breakTime > 0) {
                 schedule.push({ time: currentTime, description: `Dự vào tiết ${i}` });
                 currentTime += prepareTime;
            } else if (i==1 && eventTime == 0 && prepareTime > 0 && breakTime > 0) {
                 currentTime -= prepareTime;
                 schedule.push({ time: currentTime, description: `Dự vào tiết ${i}` });
                 currentTime += prepareTime;
            }
            schedule.push({ time: currentTime, description: `Vào tiết ${i}` });
            currentTime += lessonTime;
        }

        if (lessonCount > 0) schedule.push({ time: currentTime, description: "Ra về" });
        
        return schedule.map(item => ({...item,time:minuteToTime(item.time)})).sort((a,b)=>timeToMinute(a.time)-timeToMinute(b.time));
    }

    function updatePreviewTable(){
        const tableDiv = document.getElementById("details-table");
        if (!document.getElementById('enable').checked) {
            tableDiv.innerHTML = "<p style='text-align:center;'>Lịch này đang tắt.</p>"; return;
        }
        updateCacheFromUI(); // Lấy dữ liệu mới nhất từ UI
        const schedule = calculateSchedule();
        let html = "<table><thead><tr><th>STT</th><th>Thời gian</th><th>Nội dung</th></tr></thead><tbody>";
        schedule.forEach((e, t) => { html += `<tr><td>${t + 1}</td><td>${e.time}</td><td>${e.description}</td></tr>` });
        html += "</tbody></table>";
        tableDiv.innerHTML = html;
    }
    
    function copyMorningSchedule() {
        if (!confirm("Sao chép lịch này đến các ngày còn lại (T3-CN) của buổi Sáng?")) return;
        updateCacheFromUI(); // Đảm bảo dữ liệu nguồn là mới nhất
        const sourceData = JSON.parse(JSON.stringify(scheduleDataCache.lich.sang[currentDay]));
        days.forEach(day => {
            if (day.id !== 't2' && day.id !== currentDay) {
                scheduleDataCache.lich.sang[day.id] = JSON.parse(JSON.stringify(sourceData));
            }
        });
        showNotification("Sao chép thành công! Nhấn 'Lưu' để áp dụng.", "success");
    }
    
    function copyAfternoonSchedule() {
        if (!confirm("Sao chép lịch này đến các ngày còn lại của buổi Chiều?")) return;
        updateCacheFromUI();
        const sourceData = JSON.parse(JSON.stringify(scheduleDataCache.lich.chieu[currentDay]));
        days.forEach(day => {
            if (day.id !== currentDay) {
                scheduleDataCache.lich.chieu[day.id] = JSON.parse(JSON.stringify(sourceData));
            }
        });
        showNotification("Sao chép thành công! Nhấn 'Lưu' để áp dụng.", "success");
    }

    // --- CÁC HÀM CHO MODAL (CÓ THỂ THÊM LẠI SAU NẾU CẦN) ---
    function openAdvancedSettingsModal() { showNotification("Chức năng đang được xây dựng.", "info"); }

    window.onload = init;
  </script>
</body>
